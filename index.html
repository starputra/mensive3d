<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>life is so private no one knows today is my birthday</title>
<hbd="bintang">
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
    }
    .falling {
      position: absolute;
      font-size: 24px;
      white-space: nowrap;
      animation: fall linear infinite;
      color: #fff;
      text-shadow: 0 0 10px #0ff;
    }
    .heart {
      color: red;
      font-size: 20px;
      animation: fall linear infinite;
      position: absolute;
    }
    @keyframes fall {
      0% {
        transform: translateY(-10vh) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0.6;
      }
    }
  </style>
</head>
